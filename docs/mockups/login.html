<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — The Punisher</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            border: 'hsl(240 3.7% 15.9%)',
            input: 'hsl(240 3.7% 15.9%)',
            ring: 'hsl(240 4.9% 83.9%)',
            background: 'hsl(240 10% 3.9%)',
            foreground: 'hsl(0 0% 98%)',
            primary: { DEFAULT: 'hsl(0 0% 98%)', foreground: 'hsl(240 5.9% 10%)' },
            secondary: { DEFAULT: 'hsl(240 3.7% 15.9%)', foreground: 'hsl(0 0% 98%)' },
            muted: { DEFAULT: 'hsl(240 3.7% 15.9%)', foreground: 'hsl(240 5% 64.9%)' },
            accent: { DEFAULT: 'hsl(240 3.7% 15.9%)', foreground: 'hsl(0 0% 98%)' },
            destructive: { DEFAULT: 'hsl(0 62.8% 30.6%)', foreground: 'hsl(0 0% 98%)' },
            card: { DEFAULT: 'hsl(240 10% 3.9%)', foreground: 'hsl(0 0% 98%)' },
          },
          borderRadius: { lg: '0.5rem', md: 'calc(0.5rem - 2px)', sm: 'calc(0.5rem - 4px)' },
        }
      }
    }
  </script>
  <style>
    body { background: hsl(240 10% 3.9%); color: hsl(0 0% 98%); font-family: system-ui, -apple-system, sans-serif; }
    .input-field { background: transparent; border: 1px solid hsl(240 3.7% 15.9%); border-radius: 0.375rem; padding: 0.5rem 0.75rem; width: 100%; color: hsl(0 0% 98%); outline: none; font-size: 0.875rem; }
    .input-field:focus { border-color: hsl(240 4.9% 83.9%); box-shadow: 0 0 0 2px hsl(240 4.9% 83.9% / 0.2); }
    .input-field::placeholder { color: hsl(240 5% 64.9%); }
    .btn-primary { background: hsl(0 0% 98%); color: hsl(240 5.9% 10%); padding: 0.5rem 1rem; border-radius: 0.375rem; font-size: 0.875rem; font-weight: 500; width: 100%; cursor: pointer; border: none; }
    .btn-primary:hover { background: hsl(0 0% 90%); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-secondary mb-4">
        <i data-lucide="skull" class="w-6 h-6"></i>
      </div>
      <h1 class="text-2xl font-bold tracking-tight">The Punisher</h1>
      <p class="text-sm text-muted-foreground mt-1">Connectez-vous à votre compte</p>
    </div>

    <!-- Card -->
    <div class="rounded-lg border border-border bg-card p-6 shadow-sm">
      <form class="space-y-4">
        <!-- Email -->
        <div class="space-y-2">
          <label class="text-sm font-medium" for="email">Email</label>
          <input id="email" type="email" placeholder="professeur@ecole.fr" class="input-field">
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <label class="text-sm font-medium" for="password">Mot de passe</label>
          <input id="password" type="password" placeholder="••••••••" class="input-field">
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary mt-2">Se connecter</button>
      </form>
    </div>

    <!-- Link -->
    <p class="text-center text-sm text-muted-foreground mt-4">
      Pas encore de compte ?
      <a href="register.html" class="underline underline-offset-4 hover:text-foreground">Créer un compte</a>
    </p>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
