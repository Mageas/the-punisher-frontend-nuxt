services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: the-punisher-frontend:latest
    container_name: the-punisher-frontend
    ports:
      - '3000:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - NUXT_PUBLIC_API_BASE_URL=${NUXT_PUBLIC_API_BASE_URL:-http://localhost:8080/v1}
      - NUXT_API_BASE_URL_SERVER=${NUXT_API_BASE_URL_SERVER:-http://localhost:8080/v1}
    restart: unless-stopped
